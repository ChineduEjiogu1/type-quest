<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Engine</title>
  </head>
  <body>
    <!-- 1. The Mount Point: React physically injects your App here -->
    <div id="root"></div>

    <!-- 2. The Bridge: Tells Vite/your loader to grab your code entry point -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
